<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Glow Breaker</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-liff-id="YOUR_LIFF_ID" data-verified-mini-app="false">
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">LINE Mini App Ready</p>
        <h1>Glow Breaker</h1>
      </div>
      <button id="pauseButton" class="ghost-button" type="button" aria-label="Pause game">Pause</button>
    </header>

    <section class="hero-card">
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Score</span>
          <strong id="scoreValue">0</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Best</span>
          <strong id="bestValue">0</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Lives</span>
          <strong id="livesValue">3</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Stage</span>
          <strong id="stageValue">1</strong>
        </div>
      </div>

      <div class="playfield-frame">
        <canvas id="gameCanvas" width="720" height="1080" aria-label="ブロック崩しゲーム"></canvas>

        <div class="overlay" id="startOverlay">
          <div class="overlay-card">
            <p class="eyebrow">Tap & Slide</p>
            <div class="player-chip" aria-live="polite">
              <span class="player-chip-label">LINE User</span>
              <strong id="playerNameValue">読み込み中...</strong>
            </div>
            <h2>指でバーを動かして<br>ブロックを一気に崩そう</h2>
            <p class="overlay-copy">連続ヒットでコンボ倍率アップ。ステージが進むほどボールも速くなります。</p>
            <button id="startButton" class="primary-button" type="button">ゲームスタート</button>
          </div>
        </div>

        <div class="overlay hidden" id="messageOverlay">
          <div class="overlay-card compact">
            <p class="eyebrow" id="messageEyebrow">Paused</p>
            <h2 id="messageTitle">一時停止中</h2>
            <p class="overlay-copy" id="messageCopy">再開して続きを遊べます。</p>
            <div class="overlay-actions">
              <button id="resumeButton" class="primary-button" type="button">再開する</button>
              <button id="secondaryActionButton" class="secondary-button hidden" type="button">あとで</button>
            </div>
          </div>
        </div>
      </div>

      <div class="controls-hint">
        <span>左右にスライドして操作</span>
        <span>タップで再開 / リトライ</span>
      </div>
    </section>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./game.js"></script>
</body>
</html>
